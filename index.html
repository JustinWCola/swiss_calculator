<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>瑞士轮对阵计算器</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <h1>瑞士轮对阵表</h1>

    <section class="panel">
      <h2>赛事设置</h2>
      <div class="grid">
        <label>队伍数量
          <input id="teamCount" type="number" min="2" max="64" step="2" value="8" />
        </label>
        <label>轮数
          <input id="roundCount" type="number" min="1" max="9" value="3" />
        </label>
      </div>
      <button id="generateBtn" type="button">生成赛程</button>
    </section>

    <section class="panel">
      <h2>对阵表（首轮可直接设置对阵，后续自动计算）</h2>
      <div id="bracket" class="bracket"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
